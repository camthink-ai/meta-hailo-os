# Same structure as meta-hailo-soc; repos use URL for standalone checkout.
header:
  version: 11

local_conf_header:
  DSP: |
    DSP_COMPILATION_MODE = "release"
    DSP_FULL_IMAGING = "false"
  gstreamer: |
    ADD_GSTREAMER_TO_IMAGE = "true"
  flags: |
    LICENSE_FLAGS_ACCEPTED:append = " commercial"
  buildhistory: |
    INHERIT += "buildhistory"
    BUILDHISTORY_COMMIT = "1"

repos:
  meta-hailo-soc:
    url: https://github.com/hailo-ai/meta-hailo-soc
    tag: v.1.12.0
    layers:
      meta-hailo-bsp:
      meta-hailo-bsp-examples:
      meta-hailo-dsp:
      meta-hailo-imaging:
      meta-hailo-linux:
      meta-hailo-media-library:

  meta-hailo:
    url: "https://github.com/hailo-ai/meta-hailo.git"
    branch: kirkstone-v5.3.0
    layers:
      meta-hailo-libhailort:
      meta-hailo-vpu:
